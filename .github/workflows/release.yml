name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Determine npm dist-tag
        id: dist_tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Strip build metadata, then take the prerelease identifier (after '-').
          core="${version%%+*}"
          prerelease=""
          case "$core" in
            *-*) prerelease="${core#*-}"; prerelease="${prerelease%%.*}" ;;
          esac
          case "$prerelease" in
            "")     echo "tag=latest" >> "$GITHUB_OUTPUT" ;;
            alpha)  echo "tag=alpha"  >> "$GITHUB_OUTPUT" ;;
            beta)   echo "tag=beta"   >> "$GITHUB_OUTPUT" ;;
            rc)     echo "tag=next"   >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error::unsupported prerelease identifier '$prerelease' in version '$version' (allowed: alpha, beta, rc)"
              exit 1
              ;;
          esac

      - name: Publish
        run: pnpm publish --access public --no-git-checks --provenance --tag ${{ steps.dist_tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.dist_tag.outputs.tag != 'latest' }}
