name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Determine npm dist-tag
        id: dist_tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          case "$version" in
            *-alpha*) echo "tag=alpha" >> "$GITHUB_OUTPUT" ;;
            *-beta*)  echo "tag=beta"  >> "$GITHUB_OUTPUT" ;;
            *-rc*)    echo "tag=next"  >> "$GITHUB_OUTPUT" ;;
            *-*)      echo "tag=next"  >> "$GITHUB_OUTPUT" ;;
            *)        echo "tag=latest" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Publish
        run: pnpm publish --access public --no-git-checks --provenance --tag ${{ steps.dist_tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.dist_tag.outputs.tag != 'latest' }}
