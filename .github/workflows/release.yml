name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Determine npm dist-tag
        id: dist_tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Strip build metadata, then take the prerelease identifier (after '-').
          core="${version%%+*}"
          prerelease=""
          case "$core" in
            *-*) prerelease="${core#*-}"; prerelease="${prerelease%%.*}" ;;
          esac
          case "$prerelease" in
            "")     echo "tag=latest" >> "$GITHUB_OUTPUT" ;;
            alpha)  echo "tag=alpha"  >> "$GITHUB_OUTPUT" ;;
            beta)   echo "tag=beta"   >> "$GITHUB_OUTPUT" ;;
            rc)     echo "tag=next"   >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error::unsupported prerelease identifier '$prerelease' in version '$version' (allowed: alpha, beta, rc)"
              exit 1
              ;;
          esac

      - name: Publish
        run: npm publish --access public --provenance --tag "$DIST_TAG"
        env:
          DIST_TAG: ${{ steps.dist_tag.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          prerelease: ${{ steps.dist_tag.outputs.tag != 'latest' }}
